server {
    listen 8080;
    server_name _;

    # This is the only browser-facing local origin.  Cloudflared terminates
    # its tunnel against this listener; backend and Vite stay on the Compose
    # network and are never published to the host.
    client_max_body_size 25m;

    location = /health {
        proxy_pass http://backend:8888/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://backend:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend:8888/api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        # Vite's host allowlist remains internal.  The public Host is never
        # passed through to the development server.
        proxy_set_header Host frontend:5173;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
