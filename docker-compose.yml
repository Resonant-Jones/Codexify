  tts:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    entrypoint: ["python"]
    environment:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      PYTHONPATH: /app
      HF_HOME: /root/.cache/huggingface
      # Allow online downloads by default; set to 1 after running hf-prefetch for air-gapped use.
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-0}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-0}"
    volumes:
