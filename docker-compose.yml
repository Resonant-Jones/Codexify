# Usage:
#   docker compose build --no-cache
#   docker compose up --build

services:
  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/guardian
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "guardian", "RETURN 1"]
      interval: 5s
      timeout: 10s
      retries: 10
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: guardian
      POSTGRES_PASSWORD: guardian
      POSTGRES_DB: guardian
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardian -d guardian"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${PG_PORT:-5432}:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 8888
      DATABASE_URL: "postgresql://guardian:guardian@db:5432/guardian"
      NEO4J_BOLT_URL: "bolt://neo4j:guardian@neo4j:7687"
      GUARDIAN_API_KEY: "${GUARDIAN_API_KEY:-changeme}"
      ENABLE_CONNECTOR_WORKER: "false"
    command: uvicorn codexify.guardian_api:app --host 0.0.0.0 --port 8888
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8888}:8888"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: node:20-alpine
    environment:
      VITE_DEV_PORT: "${FRONTEND_PORT:-5173}"
      VITE_USE_PROXY: "true"
      VITE_PROXY_TARGET: "http://backend:8888"
      VITE_BACKEND_URL: "http://backend:8888"
      VITE_GUARDIAN_API_KEY: "${GUARDIAN_API_KEY:-local-guardian-ui}"
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
    command: sh -lc "pnpm --dir src dev -- --host 0.0.0.0 --port ${VITE_DEV_PORT:-5173}"
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    # Optional for live coding: mount just the app folder
    # volumes:
    #   - ./frontend/src:/app/src

volumes:
  pg_data:

  neo4j_data:
