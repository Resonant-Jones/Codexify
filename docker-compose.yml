name: codexify

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: codexify
      POSTGRES_PASSWORD: codexify
      POSTGRES_DB: Codexify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codexify -d Codexify"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/codexify
      NEO4J_server_default__listen__address: 0.0.0.0
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p codexify 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30

  graph-init:
    image: neo4j:5
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"
    entrypoint: ["sh", "-lc"]
    command: |
      echo "
      CREATE CONSTRAINT user_id_unique     IF NOT EXISTS FOR (u:User)    REQUIRE u.id IS UNIQUE;
      CREATE CONSTRAINT project_id_unique  IF NOT EXISTS FOR (p:Project) REQUIRE p.id IS UNIQUE;
      CREATE CONSTRAINT thread_id_unique   IF NOT EXISTS FOR (t:Thread)  REQUIRE t.id IS UNIQUE;
      CREATE CONSTRAINT message_id_unique  IF NOT EXISTS FOR (m:Message) REQUIRE m.id IS UNIQUE;
      CREATE INDEX project_name_idx IF NOT EXISTS FOR (p:Project) ON (p.name);
      CREATE INDEX person_name_idx  IF NOT EXISTS FOR (p:Person)  ON (p.name);
      MERGE (me:User {id:'me'}) ON CREATE SET me.name = 'Resonant Jones';
      MERGE (p:Project {id:'proj-loose-threads'}) ON CREATE SET p.name = 'Loose Threads', p.createdAt = datetime();
      MERGE (me)-[:OWNS]->(p);
      " | cypher-shell -a bolt://neo4j:7687 -u neo4j -p codexify

  migrator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    entrypoint: []            # ensure our command runs; ignore any image ENTRYPOINT
    environment:
      DATABASE_URL: postgresql://codexify:codexify@db:5432/Codexify
      GUARDIAN_DB_DSN: postgresql://codexify:codexify@db:5432/Codexify
      GUARDIAN_CHATLOG_DSN: postgresql://codexify:codexify@db:5432/Codexify
      ENABLE_BLIP_MODEL: "false"   # keep migrations light (no model loading)
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    command: >
      sh -lc '
        set -e
        echo "[Migrator] Running Alembic migrations..."
        alembic --raiseerr -c backend/alembic.ini upgrade head
        echo "[Migrator] Running seed script..."
        python backend/scripts/seed_defaults.py
        echo "[Migrator] Seed script completed."
        echo "[Migrator] Done."
      '
    volumes:
      - .:/app

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    entrypoint: []            # ensure uvicorn runs directly; ignore image ENTRYPOINT
    env_file: .env
    environment:
      DATABASE_URL: postgresql://codexify:codexify@db:5432/Codexify
      GUARDIAN_DB_DSN: postgresql://codexify:codexify@db:5432/Codexify
      GUARDIAN_CHATLOG_DSN: postgresql://codexify:codexify@db:5432/Codexify
      PORT: "8888"
      NEO4J_BOLT_URL: bolt://neo4j:codexify@neo4j:7687
      GUARDIAN_API_KEY: 001a8ae3c2e7fe3a89c466803beb3449df5989e97f6e170be43856a38e3e9e8e
      ENABLE_CONNECTOR_WORKER: "false"
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      codexify-init:
        condition: service_completed_successfully
    command: uvicorn guardian.guardian_api:app --host 0.0.0.0 --port 8888
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8888/ping', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s
    ports: ["8888:8888"]
    restart: unless-stopped
    volumes:
      - .:/app

  frontend:

    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/src/node_modules
    environment:
      # Ensure pnpm installs modules inside the container mount and skips heavy postinstall scripts
      VITE_PROXY_TARGET: http://backend:8888
      VITE_GUARDIAN_API_KEY: 001a8ae3c2e7fe3a89c466803beb3449df5989e97f6e170be43856a38e3e9e8e
      PNPM_HOME: /app
      PNPM_CONFIG_IGNORE_SCRIPTS: "true"
      CI: "true"
      # Stabilize file watching inside Docker on macOS/Windows
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -lc '
        set -e
        echo "[Frontend] Installing root deps..."
        pnpm install --frozen-lockfile=false --ignore-scripts || pnpm install --ignore-scripts
        echo "[Frontend] Installing src deps..."
        pnpm --dir src install --frozen-lockfile=false --ignore-scripts || pnpm --dir src install --ignore-scripts
        echo "[Frontend] Starting Vite dev server..."
        cd /app/src && npx vite dev --host 0.0.0.0 --port 5173
      '

  codexify-init:
    image: alpine:latest
    depends_on:
      migrator:
        condition: service_completed_successfully
      graph-init:
        condition: service_completed_successfully
    command: >
      sh -c 'echo "[Codexify-Init] ✅ Migration and Graph setup verified."'
    restart: "no"

volumes:
  pg_data:
  neo4j_data:
