name: Frontend Quality

on:
  push:
    branches: ["main"]
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/frontend-quality.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/frontend-quality.yml'

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Build
        run: pnpm run build
      - name: Test
        run: pnpm run test
      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-quality-logs
          path: frontend
