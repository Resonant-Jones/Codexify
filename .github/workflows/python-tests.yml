name: Python Tests (Backend Container)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      GUARDIAN_ALLOW_DUMMY_SETTINGS: "1"
      GENAI_API_KEY: "dummy"
      NOTION_API_KEY: "dummy"
      ANTHROPIC_API_KEY: "dummy"
      OPENAI_API_KEY: "dummy"
      GEMINI_API_KEY: "dummy"
      GOOGLE_API_KEY: "dummy"
      PYTEST_VERBOSE_BOOT: "1"
      FORESIGHT_TIMEOUT: "2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose down -v || true
          docker compose build backend

      - name: Env for tests (dummy + gate)
        run: |
          python - <<'PY'
          import os
          print("CI env seeded? ",
                all(os.getenv(k) for k in
                    ["GUARDIAN_ALLOW_DUMMY_SETTINGS","GENAI_API_KEY","NOTION_API_KEY","ANTHROPIC_API_KEY"]))
          PY

      - name: Run Python tests in backend container
        run: |
          docker compose up -d db
          sleep 10
          docker compose up -d backend
          docker compose exec backend bash -c "pytest -q -s || exit 1"
        continue-on-error: true

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-logs
          path: ./tests
