name: Schema Drift & Alembic Contract Validation

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'guardian/db/models.py'
      - 'guardian/db/migrations/**'
      - 'tests/test_migrations.py'
      - 'docker-compose.yml'

jobs:
  schema-check:
    runs-on: ubuntu-latest
    env:
      PYTEST_VERBOSE_BOOT: "1"
      GUARDIAN_ALLOW_DUMMY_SETTINGS: "1"
      DATABASE_URL: "postgresql://guardian:guardian@db:5432/guardian"
      TEST_DATABASE_URL: "postgresql://guardian:guardian@db:5432/test_guardian"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose down -v || true
          docker compose build backend

      - name: Start Database
        run: |
          docker compose up -d db
          sleep 10

      - name: Run Schema Contract Test
        run: |
          docker compose up -d backend
          docker compose exec backend bash -c "export TEST_DATABASE_URL=\$DATABASE_URL && pytest tests/test_migrations.py -v"
        continue-on-error: true

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: schema-drift-contract-logs
          path: ./tests
