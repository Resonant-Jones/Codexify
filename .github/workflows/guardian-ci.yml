name: Guardian CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate Alembic migrations
        run: |
          pytest tests/test_migrations.py -v || exit 1

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: schema-validate-logs
          path: ./tests

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Frontend tests
        run: pnpm test

  build-and-test:
    runs-on: ubuntu-latest
    needs: schema-validate
    env:
      # Dummy API keys for CI: do NOT use real secrets! These let tests pass pydantic validation.
      # Dummy keys so pydantic Settings validation passes during test collection
      GENAI_API_KEY: "dummy"
      NOTION_API_KEY: "dummy"
      ANTHROPIC_API_KEY: "dummy"
      # Use Groq in CI to avoid OpenAI dependency; swap to "openai" if desired
      LLM_PROVIDER: "groq"
      GROQ_API_KEY: "dummy"
      # Keep Python output unbuffered for clearer logs
      PYTHONUNBUFFERED: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Show Python info
        run: |
          which python
          python -V

      - name: Install dependencies (robust)
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          # Install the package itself if configured as a project
          if [ -f pyproject.toml ] || [ -f setup.cfg ]; then python -m pip install -e .; fi
          # Install project deps if present
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          # Ensure pytest is available even if not listed
          python -c "
          import importlib, subprocess, sys
          try:
              importlib.import_module('pytest')
              print('pytest already installed')
          except Exception:
              subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'pytest'])
          "

      - name: Run tests
        shell: bash
        run: |
          set -euxo pipefail
          # quick import sanity so we fail early on import errors
          python -c "
          import sys
          print('Import sanity OK on', sys.version.split()[0])
          "
          # run pytest; -q + --maxfail keeps logs readable
          python -m pytest -q --maxfail=1 --disable-warnings -k "not cli"

  schema-contract-validation:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      PYTEST_VERBOSE_BOOT: "1"
      GUARDIAN_ALLOW_DUMMY_SETTINGS: "1"
      DATABASE_URL: "postgresql://guardian:guardian@db:5432/guardian"
      TEST_DATABASE_URL: "postgresql://guardian:guardian@db:5432/test_guardian"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose down -v || true
          docker compose build backend

      - name: Start Database
        run: |
          docker compose up -d db
          sleep 10

      - name: Run Schema Contract Test
        run: |
          docker compose up -d backend
          docker compose exec backend bash -c "export TEST_DATABASE_URL=\$DATABASE_URL && pytest tests/test_migrations.py -v"

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: schema-contract-logs
          path: ./tests