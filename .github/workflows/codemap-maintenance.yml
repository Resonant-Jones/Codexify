name: Codemap maintenance

# NOTE: All cron times are UTC. Adjust if you expect output at a specific local time.

on:
  # schedule:
  #   - cron: '23 3 * * *'   # nightly UTC (disabled)
  #   - cron: '15 4 * * 0'   # weekly Sunday UTC (disabled)
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - 'guardian/core/**'
      - 'guardian/db/**'
      - 'scripts/codemap/**'
      - '.github/workflows/codemap-maintenance.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'guardian/core/**'
      - 'guardian/db/**'
      - 'scripts/codemap/**'
      - '.github/workflows/codemap-maintenance.yml'

concurrency:
  group: codemap-maintenance
  cancel-in-progress: true

jobs:
  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate Alembic migrations
        run: |
          pytest tests/test_migrations.py -v || exit 1

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codemap-schema-logs
          path: ./tests

  maintain:
    needs: schema-validate
    # id: maintain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project (for codemap generator)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Clean old codemap snapshots (keep 7)
        env:
          KEEP: '7'
        run: make codemap-clean

      - name: Generate new codemap snapshot
        shell: bash
        run: |
          set -euo pipefail
          ts=$(date -u +%Y%m%d-%H%M%S)
          export CODEMAP_PATH="artifacts/codemap/codemap-$ts.json"
          make codemap

      - name: Size gate (<= 50 MB)
        shell: bash
        run: |
          f=$(ls -1t artifacts/codemap/*.json | head -n1)
          bytes=$(wc -c <"$f")
          echo "Codemap size: $bytes bytes"
          [ "$bytes" -le 52428800 ] || { echo "Codemap too large"; exit 1; }

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: codemap-maintenance-logs
          path: artifacts/codemap/

      - name: Upload codemap artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codemap-${{ github.run_id }}
          # The codemap artifacts are created by 'make codemap' and are kept in artifacts/codemap/.
          path: artifacts/codemap/*.json
          if-no-files-found: ignore
          retention-days: 14

  weekly-clean:
    # id: weekly-clean
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Hard prune to 1 snapshot
        env:
          KEEP: '1'
        run: make codemap-clean
