name: Guardian CI

defaults:
  run:
    shell: bash

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Temporarily exclude 3.13 to avoid setup issues; we can re-enable later.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Select python alias
        id: pickpy
        run: |
          if command -v python >/dev/null 2>&1; then
            echo "pyexe=python" >> "$GITHUB_OUTPUT"
          else
            echo "pyexe=python3" >> "$GITHUB_OUTPUT"
          fi
          echo "Using ${{ steps.pickpy.outputs.pyexe }}"

      - name: Upgrade pip tooling
        run: |
          PY="${{ steps.pickpy.outputs.pyexe }}"
          if [ -z "$PY" ]; then
            PY=$(command -v python || command -v python3)
          fi
          "$PY" -m pip install --upgrade pip wheel

      - name: Install dependencies
        run: |
          PY="${{ steps.pickpy.outputs.pyexe }}"
          if [ -z "$PY" ]; then
            PY=$(command -v python || command -v python3)
          fi
          # Common dependency files (install if present)
          if [ -f requirements-locked.txt ]; then "$PY" -m pip install -r requirements-locked.txt; fi
          if [ -f dev-requirements.txt ]; then "$PY" -m pip install -r dev-requirements.txt; fi
          if [ -f test-requirements.txt ]; then "$PY" -m pip install -r test-requirements.txt; fi
          if [ -f requirements.txt ]; then "$PY" -m pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then "$PY" -m pip install -e .; fi

      - name: Install pytest (test runner)
        run: |
          PY="${{ steps.pickpy.outputs.pyexe }}"
          if [ -z "$PY" ]; then
            PY=$(command -v python || command -v python3)
          fi
          "$PY" -m pip install pytest

      - name: Show environment versions
        run: |
          set -x
          echo "PATH=$PATH"
          which python || true
          which python3 || true
          PY="${{ steps.pickpy.outputs.pyexe }}"
          if [ -z "$PY" ]; then
            PY=$(command -v python || command -v python3)
          fi
          "$PY" --version
          "$PY" -m pip --version
          "$PY" -m pip list

      - name: Run Pre-commit hooks (if configured)
        run: |
          PY="${{ steps.pickpy.outputs.pyexe }}"
          if [ -f .pre-commit-config.yaml ] || [ -f .pre-commit-config.yml ]; then
            "$PY" -m pip install pre-commit
            "$PY" -c "import sys, pre_commit; print('pre_commit OK from', sys.executable)" || true
            "$PY" -m pre_commit run --all-files --show-diff-on-failure
          else
            echo "No pre-commit config found; skipping."
          fi

      - name: Debug PATH and tools
        run: |
          set -x
          command -v pytest || true
          PY="${{ steps.pickpy.outputs.pyexe }}"
          if [ -z "$PY" ]; then
            PY=$(command -v python || command -v python3)
          fi
          "$PY" - <<'PY'
import sys, shutil
print('sys.executable =', sys.executable)
print('pytest in path  =', shutil.which('pytest'))
try:
    import pytest
    print('pytest version =', pytest.__version__)
except Exception as e:
    print('pytest import failed:', e)
PY

      - name: Run Pytest
        env:
          SCRUB_LOGS: "1"
          GUARDIAN_LOG_LEVEL: "INFO"
          GOOGLE_APPLICATION_CREDENTIALS: ""
          GDRIVE_OAUTH_TOKEN: ""
          GUARDIAN_API_BASE: ""
        run: |
          set -euxo pipefail
          PY="${{ steps.pickpy.outputs.pyexe }}"
          if [ -z "$PY" ]; then
            PY=$(command -v python || command -v python3)
          fi
          "$PY" -m pytest -q --maxfail=2 --disable-warnings --tb=short -k "not integration and not gdrive"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: guardian-logs-${{ matrix.python-version }}
          path: |
            guardian.log
            **/pytest-*.log
          if-no-files-found: ignore
