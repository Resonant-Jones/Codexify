name: Guardian CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Dummy keys so pydantic Settings validation passes during test collection
      GENAI_API_KEY: "dummy"
      NOTION_API_KEY: "dummy"
      ANTHROPIC_API_KEY: "dummy"
      # Use Groq in CI to avoid OpenAI dependency; swap to "openai" if desired
      LLM_PROVIDER: "groq"
      GROQ_API_KEY: "dummy"
      # Keep Python output unbuffered for clearer logs
      PYTHONUNBUFFERED: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python info
        run: |
          which python
          python -V

      - name: Install dependencies (robust)
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip setuptools wheel
          # Install the package itself if configured as a project
          if [ -f pyproject.toml ] || [ -f setup.cfg ]; then python -m pip install -e .; fi
          # Install project deps if present
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          # Ensure pytest is available even if not listed
          python -c "
          import importlib, subprocess, sys
          try:
              importlib.import_module('pytest')
              print('pytest already installed')
          except Exception:
              subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'pytest'])
          "

      - name: Run tests
        shell: bash
        env:
          GENAI_API_KEY: "dummy"
          NOTION_API_KEY: "dummy"
          ANTHROPIC_API_KEY: "dummy"
          LLM_PROVIDER: "groq"
          GROQ_API_KEY: "dummy"
        run: |
          set -euxo pipefail
          # quick import sanity so we fail early on import errors
          python -c "
          import sys
          print('Import sanity OK on', sys.version.split()[0])
          "
          # run pytest; -q + --maxfail keeps logs readable
          python -m pytest -q --maxfail=1 --disable-warnings -k "not cli"
