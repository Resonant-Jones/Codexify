from __future__ import annotations

import os
import time
from typing import Any, Optional


class _InMemoryRedis:
    """A minimal Redis-like client for tests/dev.

    Supports:
      - setex(key, ttl_seconds, value)
      - get(key)
      - delete(key)

    Maintains `_expiries` as epoch seconds for test assertions.
    """

    def __init__(self) -> None:
        self._store: dict[str, bytes] = {}
        self._expiries: dict[str, float] = {}

    def _purge_if_expired(self, key: str) -> None:
        exp = self._expiries.get(key)
        if exp is None:
            return
        if time.time() >= exp:
            self._store.pop(key, None)
            self._expiries.pop(key, None)

    def setex(self, key: str, ttl_seconds: int, value: Any) -> bool:
        if ttl_seconds is None:
            ttl_seconds = 0
        try:
            ttl_i = int(ttl_seconds)
        except Exception:
            ttl_i = 0

        if isinstance(value, bytes):
            b = value
        else:
            b = str(value).encode("utf-8")

        self._store[key] = b
        self._expiries[key] = time.time() + max(ttl_i, 0)
        return True

    def get(self, key: str) -> Optional[bytes]:
        self._purge_if_expired(key)
        return self._store.get(key)

    def delete(self, key: str) -> int:
        existed = 1 if key in self._store else 0
        self._store.pop(key, None)
        self._expiries.pop(key, None)
        return existed


def _is_mock_object(obj: Any) -> bool:
    if obj is None:
        return False
    # Avoid importing unittest.mock in prod paths; detect by module/name.
    cls = getattr(obj, "__class__", None)
    mod = getattr(cls, "__module__", "") if cls else ""
    name = getattr(cls, "__name__", "") if cls else ""
    if mod.startswith("unittest.mock"):
        return True
    if name in {"Mock", "MagicMock", "NonCallableMock"}:
        return True
    # Heuristic: mock objects commonly have these attributes.
    return hasattr(obj, "mock_calls") or hasattr(obj, "assert_called")


# Cache the resolved client so normal runtime code doesn't reconnect constantly.
# Note: this is exactly what can go wrong in tests if the cached value is a mock.
_CACHED_REDIS_CLIENT: Optional[Any] = None


def get_redis_client() -> Any:
    """Return a Redis client.

    Behavior:
    - Normal runtime: returns a real redis.Redis client (from REDIS_URL/REDIS_QUEUE_URL).
    - Pytest: if the resolved client *looks like* a mock (MagicMock), return a
      deterministic in-memory Redis implementation instead.

    This prevents order-dependent failures where another test patched
    `redis.Redis.from_url` and the cached client became a MagicMock.
    """

    global _CACHED_REDIS_CLIENT

    # If we already cached a good client, return it.
    if _CACHED_REDIS_CLIENT is not None and not _is_mock_object(_CACHED_REDIS_CLIENT):
        return _CACHED_REDIS_CLIENT

    # If we're in pytest and the cached client is a mock, throw it away.
    in_pytest = "PYTEST_CURRENT_TEST" in os.environ
    if in_pytest and _is_mock_object(_CACHED_REDIS_CLIENT):
        _CACHED_REDIS_CLIENT = None

    # Respect an explicit opt-in to force in-memory (useful for local/dev too).
    if os.environ.get("GUARDIAN_REDIS_IN_MEMORY", "").strip() in {"1", "true", "TRUE", "yes", "YES"}:
        _CACHED_REDIS_CLIENT = _InMemoryRedis()
        return _CACHED_REDIS_CLIENT

    # Build a real Redis client.
    # NOTE: keep compatibility with any existing env var naming.
    redis_url = (
        os.environ.get("REDIS_URL")
        or os.environ.get("REDIS_QUEUE_URL")
        or os.environ.get("GUARDIAN_REDIS_URL")
        or "redis://localhost:6379/0"
    )

    try:
        # The module already imports/uses `redis` elsewhere; rely on that.
        client = redis.Redis.from_url(redis_url)
    except Exception:
        client = None

    # In pytest, if redis construction returns a mock (or fails), fallback.
    if in_pytest and (_is_mock_object(client) or client is None):
        _CACHED_REDIS_CLIENT = _InMemoryRedis()
        return _CACHED_REDIS_CLIENT

    # Last resort: if we somehow got a mock in any mode, use in-memory.
    if _is_mock_object(client):
        _CACHED_REDIS_CLIENT = _InMemoryRedis()
        return _CACHED_REDIS_CLIENT

    _CACHED_REDIS_CLIENT = client
    return client
